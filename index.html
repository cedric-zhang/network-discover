<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网络设备发现平台 - 仪表盘</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar">
        <div class="brand">网络设备发现平台 <span id="app-version"></span></div>
        <div class="links">
            <a href="/index.html" class="active">仪表盘</a>
            <a href="/scan.html">扫描</a>
            <a href="/assets.html">资产</a>
            <a href="/schedules.html">计划</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-content">
            <!-- 统计卡片区域 -->
            <div class="bento-grid">
                <div class="card-stat">
                    <div class="value" id="stat-total-ip">0</div>
                    <div class="label">总发现 IP</div>
                </div>
                <div class="card-stat">
                    <div class="value" id="stat-online-ip" style="color: var(--accent-green);">0</div>
                    <div class="label">在线 IP</div>
                </div>
                <div class="card-stat">
                    <div class="value" id="stat-offline-ip" style="color: var(--accent-red);">0</div>
                    <div class="label">离线 IP</div>
                </div>
                <div class="card-stat">
                    <div class="value" id="stat-unknown-ip" style="color: var(--text-secondary);">0</div>
                    <div class="label">未知 IP</div>
                </div>
            </div>

            <!-- 快速扫描和扫描记录 -->
            <div class="bento-grid-two-col">
                <div class="card">
                    <h2>快速扫描</h2>
                    <div class="form-group">
                        <input type="text" id="scan-target" class="input" placeholder="输入目标网段，例如：192.168.1.0/24">
                    </div>
                    <button class="btn-primary">开始扫描</button>
                </div>
                <div class="card">
                    <h2>最近扫描记录</h2>
                    <div style="margin-top: var(--space-4);">
                        <div id="recent-scans-list">
                            <!-- 最近扫描记录将通过JavaScript动态加载 -->
                            <div style="text-align: center; padding: 20px; color: var(--text-secondary);">暂无扫描记录，点击下方"开始扫描"创建第一次扫描</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 数据可视化图表区域 -->
            <div class="charts-grid">
                <div class="card chart-card">
                    <h3>IP 状态分布</h3>
                    <div class="chart-container">
                        <canvas id="chart-status"></canvas>
                    </div>
                    <div id="chart-status-fallback" class="chart-fallback" style="display:none;">
                        图表加载失败，请刷新页面重试
                    </div>
                </div>
                <div class="card chart-card">
                    <h3>厂商/OS 分布</h3>
                    <div class="chart-container">
                        <canvas id="chart-vendor"></canvas>
                    </div>
                    <div id="chart-vendor-fallback" class="chart-fallback" style="display:none;">
                        图表加载失败，请刷新页面重试
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>

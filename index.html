<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网络设备发现平台 - 仪表盘</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar">
        <div class="brand">网络设备发现平台 v0.1.0</div>
        <div class="links">
            <a href="index.html" class="active">仪表盘</a>
            <a href="scan.html">扫描</a>
            <a href="assets.html">资产</a>
            <a href="#">设置</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-content">
            <!-- 统计卡片区域 -->
            <div class="bento-grid">
                <div class="card-stat">
                    <div class="value">1,234</div>
                    <div class="label">总发现 IP</div>
                </div>
                <div class="card-stat">
                    <div class="value" style="color: var(--accent-green);">892</div>
                    <div class="label">在线 IP</div>
                </div>
                <div class="card-stat">
                    <div class="value" style="color: var(--accent-red);">234</div>
                    <div class="label">离线 IP</div>
                </div>
                <div class="card-stat">
                    <div class="value" style="color: var(--text-secondary);">108</div>
                    <div class="label">未知 IP</div>
                </div>
            </div>

            <!-- 快速扫描和扫描记录 -->
            <div class="bento-grid-two-col">
                <div class="card">
                    <h2>快速扫描</h2>
                    <div class="form-group">
                        <input type="text" class="input" placeholder="输入目标网段，例如：192.168.1.0/24">
                    </div>
                    <button class="btn-primary">开始扫描</button>
                </div>
                <div class="card">
                    <h2>最近扫描记录</h2>
                    <div style="margin-top: var(--space-4);">
                        <div style="padding: var(--space-3) 0; border-bottom: 1px solid var(--border-color);">
                            <div style="display: flex; justify-content: space-between;">
                                <span>10:30</span>
                                <span>192.168.1.0/24</span>
                                <span>发现 24 个 IP</span>
                            </div>
                        </div>
                        <div style="padding: var(--space-3) 0; border-bottom: 1px solid var(--border-color);">
                            <div style="display: flex; justify-content: space-between;">
                                <span>09:15</span>
                                <span>10.0.0.0/16</span>
                                <span>发现 156 个 IP</span>
                            </div>
                        </div>
                        <div style="padding: var(--space-3) 0; border-bottom: 1px solid var(--border-color);">
                            <div style="display: flex; justify-content: space-between;">
                                <span>昨天</span>
                                <span>172.16.0.0/24</span>
                                <span>发现 8 个 IP</span>
                            </div>
                        </div>
                        <div style="padding: var(--space-3) 0;">
                            <div style="display: flex; justify-content: space-between;">
                                <span>前天</span>
                                <span>192.168.0.0/24</span>
                                <span>发现 67 个 IP</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 厂商分布和IP状态分布 -->
            <div class="bento-grid-two-col">
                <div class="card">
                    <h2>厂商分布</h2>
                    <div class="distribution-list">
                        <div class="distribution-item">
                            <div style="display: flex; align-items: center;">
                                <span class="distribution-color" style="background-color: var(--accent-blue);"></span>
                                <span>华为</span>
                            </div>
                            <div>35%</div>
                        </div>
                        <div class="distribution-item">
                            <div style="display: flex; align-items: center;">
                                <span class="distribution-color" style="background-color: var(--accent-green);"></span>
                                <span>思科</span>
                            </div>
                            <div>28%</div>
                        </div>
                        <div class="distribution-item">
                            <div style="display: flex; align-items: center;">
                                <span class="distribution-color" style="background-color: var(--accent-cyan);"></span>
                                <span>H3C</span>
                            </div>
                            <div>18%</div>
                        </div>
                        <div class="distribution-item">
                            <div style="display: flex; align-items: center;">
                                <span class="distribution-color" style="background-color: var(--accent-orange);"></span>
                                <span>联想</span>
                            </div>
                            <div>12%</div>
                        </div>
                        <div class="distribution-item">
                            <div style="display: flex; align-items: center;">
                                <span class="distribution-color" style="background-color: var(--text-muted);"></span>
                                <span>其他</span>
                            </div>
                            <div>7%</div>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <h2>IP 状态分布</h2>
                    <div class="chart-placeholder">状态分布条形图占位符</div>
                    <div class="status-bar">
                        <div class="status-segment" style="width: 72%; background-color: var(--accent-green);">🟢 在线 72%</div>
                        <div class="status-segment" style="width: 19%; background-color: var(--accent-red);">🔴 离线 19%</div>
                        <div class="status-segment" style="width: 9%; background-color: var(--text-secondary);">⚪ 未知 9%</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="static/js/app.js"></script>
</body>
</html>

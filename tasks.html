<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网络设备发现平台 - 扫描任务</title>
    <link rel="stylesheet" href="/static/css/style.css?v=0.10.4">
    <style>
        .task-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
                .task-tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            background: var(--bg-card);
            transition: background 0.2s;
            min-width: 70px;
        }
        .task-tab .tab-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        .task-tab .tab-count {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .task-tab.active {
            background: var(--accent-cyan);
        }
        .task-tab.active .tab-label,
        .task-tab.active .tab-count {
            color: #fff;
        }

        
            padding: 8px 16px;
            border-radius: 8px;
            background: var(--bg-card);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border-color);
            font-size: 14px;
        }
        .task-tab.active {
            background: var(--accent-cyan);
            color: var(--bg-primary);
            border-color: var(--accent-cyan);
        }
        .task-tab:hover:not(.active) {
            background: var(--bg-card-hover);
        }
        .task-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 10px;
            border: 1px solid var(--border-color);
            display: grid;
            grid-template-columns: 28px 70px 50px 1fr 100px 32px 32px;
            grid-template-rows: auto;
            gap: 8px 12px;
            align-items: center;
        }
        .task-card:hover {
            background: var(--bg-card-hover);
        }
        .task-card-inner {
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow: hidden;
        }
        .task-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--accent-cyan);
            vertical-align: middle;
        }
        .task-id {
            font-size: 12px;
            color: var(--text-muted);
            text-align: left;
        }
        .task-type {
            font-size: 13px;
            color: var(--text-secondary);
            text-align: left;
        }
        .task-target-wrapper {
            text-align: left;
            min-width: 0;
        }
        .task-target {
            font-size: 14px;
            color: var(--text-primary);
            font-weight: 500;
            word-break: break-word;
            overflow-wrap: break-word;
            max-width: 100%;
        }
        .task-name {
            font-size: 12px;
            color: var(--accent-cyan);
            margin-top: 2px;
            word-break: break-word;
            overflow-wrap: break-word;
            max-width: 100%;
        }
        .task-meta {
            font-size: 11px;
            color: var(--text-muted);
        }
        .task-status {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 6px;
            font-size: 13px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
                .status-badge-sm {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
        }
        .status-queued { background: #f59e0b; }
        .status-running { background: #3b82f6; animation: pulse 1.5s infinite; }
        .status-completed { background: #22c55e; }
        .status-failed { background: #ef4444; }
        .task-meta {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .delete-btn {
            padding: 4px 8px;
            background: transparent;
            color: var(--text-muted);
            border: none;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
            text-align: center;
        }
        .delete-btn:hover {
            color: #ef4444;
        }
        .empty-state-task {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .empty-state-task a {
            color: var(--accent-cyan);
            text-decoration: none;
        }
        .page-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        #new-task-btn {
            padding: 8px 16px;
            background: var(--accent-cyan);
            color: var(--bg-primary);
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s;
        }
        #new-task-btn:hover {
            background: #00d4aa;
            transform: translateY(-1px);
        }
        .batch-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding: 8px 16px;
            background: var(--bg-card);
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }
        .batch-actions.hidden {
            display: none;
        }
        .batch-delete-btn {
            padding: 6px 16px;
            background: #ef4444;
            color: #fff;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .batch-delete-btn:hover {
            background: #dc2626;
        }
        .batch-delete-btn:disabled {
        .task-progress {
            margin-top: 6px;
        }
        .progress-bar-wrapper {
            width: 100%;
            height: 5px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
        }
        .progress-bar {
            height: 100%;
            background: var(--accent-cyan);
            border-radius: 3px;
            transition: width 0.3s;
        }
        .progress-bar.complete {
            background: #10b981;
        }
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid var(--text-muted);
            border-top-color: var(--accent-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 6px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
            background: #6b7280;
            cursor: not-allowed;
        }
        .select-all-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .selected-count {
            color: var(--text-secondary);
            font-size: 13px;
        }
        /* 分页样式 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 20px;
            padding: 16px;
        }
        .pagination-btn {
            padding: 6px 12px;
            border-radius: 6px;
            background: var(--bg-card);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .pagination-btn:hover:not(.disabled) {
            background: var(--bg-card-hover);
            color: var(--text-primary);
        }
        .pagination-btn.active {
            background: var(--accent-cyan);
            color: var(--bg-primary);
            border-color: var(--accent-cyan);
        }
        .pagination-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .pagination-info {
            color: var(--text-secondary);
            font-size: 13px;
        }

        /* 确认弹窗样式 */
        .confirm-overlay {
            pointer-events: none;  /* 隐藏时不拦截点击 */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .confirm-overlay.show {
            pointer-events: auto;  /* 显示时恢复拦截 */
            opacity: 1;
        }
        .confirm-dialog {
            background: #1e2d3d;
            border-radius: 12px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: scale(0.95);
            transition: transform 0.2s;
        }
        .confirm-overlay.show .confirm-dialog {
            transform: scale(1);
        }
        .confirm-title {
            font-size: 18px;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 12px;
        }
        .confirm-message {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        .confirm-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        .confirm-btn-cancel {
            padding: 10px 20px;
            border-radius: 8px;
            background: transparent;
            color: #94a3b8;
            border: 1px solid #475569;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .confirm-btn-cancel:hover {
            background: #334155;
            color: #f1f5f9;
        }
        .confirm-btn-delete {
            padding: 10px 20px;
            border-radius: 8px;
            background: #ef4444;
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .confirm-btn-delete:hover {
            background: #dc2626;
        }
        .confirm-btn-delete:disabled {
            background: #6b7280;
            cursor: not-allowed;
        }
    </style>
</head>

    <!-- 编辑周期弹窗 -->
    <!-- 编辑周期弹窗 -->
    <div class="confirm-overlay" id="schedule-overlay" style="display: none;">
        <div class="confirm-dialog">
            <div class="confirm-title">编辑扫描周期</div>
            <div style="margin: 16px 0;">
                <label style="color: #a0aec0; margin-bottom: 8px; display: block;">调度方式</label>
                <select id="edit-schedule-type" style="width: 100%; padding: 10px; background: #1a202c; color: #e2e8f0; border: 1px solid #4a5568; border-radius: 6px;">
                    <option value="now">立即执行</option>

                    <option value="daily">每天执行</option>
                    <option value="weekly">每周执行</option>

                </select>
            </div>
            <div id="edit-time-group" style="display: none; margin: 16px 0;">
                <label style="color: #a0aec0; margin-bottom: 8px; display: block;">选择执行时间</label>
                <input type="time" id="edit-schedule-time" value="09:00" style="width: 100%; padding: 10px; background: #1a202c; color: #e2e8f0; border: 1px solid #4a5568; border-radius: 6px;">
                <div id="edit-day-group" style="display: none; margin-top: 12px;">
                    <label style="color: #a0aec0; margin-bottom: 8px; display: block;">选择星期</label>

    </div>
<div class="container">
        <div class="page-content">
            <div class="page-header-row">
                <div class="page-title" style="white-space: nowrap;">扫描任务</div>
                <a href="/scan.html" class="btn-primary" id="new-task-btn">+ 新建扫描任务</a>
            </div>
            <div class="page-subtitle" id="task-count">加载中...</div>

            <div class="batch-actions hidden" id="batch-actions">
                <div class="select-all-wrapper">
                    <input type="checkbox" id="select-all" class="task-checkbox">
                    <label for="select-all" style="font-size: 13px; color: var(--text-secondary);">全选</label>
                </div>
                <span class="selected-count" id="selected-count">已选择 0 个</span>
                <button class="batch-delete-btn" id="batch-delete-btn" disabled>批量删除</button>
            </div>

            <div class="task-tabs">
                <div class="task-tab active" data-filter="all"><span class="tab-label">全部</span><span class="tab-count" id="count-all">0</span></div>
                <div class="task-tab" data-filter="queued"><span class="tab-label">排队中</span><span class="tab-count" id="count-queued">0</span></div>
                <div class="task-tab" data-filter="running"><span class="tab-label">运行中</span><span class="tab-count" id="count-running">0</span></div>
                <div class="task-tab" data-filter="completed"><span class="tab-label">已完成</span><span class="tab-count" id="count-completed">0</span></div>
                <div class="task-tab" data-filter="failed"><span class="tab-label">失败</span><span class="tab-count" id="count-failed">0</span></div>
            </div>

            <div id="task-list">加载中...</div>
            <div class="pagination hidden" id="pagination"></div>
        </div>
    </div>

    <script src="/static/js/app.js?v=0.10.4"></script>
    <script>
    var currentFilter = 'all';
    var allTasks = [];
    var lastTasksJSON = '';
    var pollInterval = null;
    var selectedTasks = new Set();
    var currentPage = 1;
    var pageSize = 10;
    var totalTasks = 0;          // API返回的总数
    var totalPagesFromAPI = 1;   // API返回的总页数

    function loadTasks() {
        // Always fetch all tasks for accurate counts, filter in UI
        var url = '/api/scan/tasks?page=' + currentPage + '&page_size=' + pageSize;
        fetch(url)
            .then(function(res) { return res.json(); })
            .then(function(data) {
                totalTasks = data.total;
                totalPagesFromAPI = data.total_pages;
                allTasks = data.tasks || [];
                updateCounts();
                renderTasks();
                bindDeleteEvents();
                bindCheckboxEvents();
                updateSelectedCount();
            })
            .catch(function(err) {
                console.error('Failed to load tasks:', err);
            });
    }
    
    function updateCountsFromAPI() {
        document.getElementById('task-count').textContent = '共 ' + totalTasks + ' 条任务';
    }
    function getFilteredTasks() {
        if (currentFilter === 'all') {
            return allTasks;
        }
        return allTasks.filter(function(t) {
            // 排队中：queued 和 pending
            if (currentFilter === 'queued') {
                return t.status === 'queued' || t.status === 'pending';
            }
            // 运行中：running 和 scanning（不含 pending）
            if (currentFilter === 'running') {
                return t.status === 'running' || t.status === 'scanning';
            }
            return t.status === currentFilter;
        });
    }

    function renderTasks() {
        var pageTasks = getFilteredTasks();
        var totalPages = totalPagesFromAPI;

        var container = document.getElementById('task-list');

        if (pageTasks.length === 0) {
            container.innerHTML = '<div class="empty-state-task">暂无扫描任务<br><br><a href="/scan.html">去创建一个 →</a></div>';
            document.getElementById('batch-actions').classList.add('hidden');
            document.getElementById('pagination').classList.add('hidden');
            return;
        }

        document.getElementById('batch-actions').classList.remove('hidden');

        container.innerHTML = pageTasks.map(function(task) {
            var statusInfo = getStatusInfo(task.status);
            var taskIdShort = task.task_id ? task.task_id.substring(0, 12) : 'N/A';
            var targetType = task.target.includes('/') ? '网段' : '单IP';
            var timeStr = formatTime(task.created_at);
            var isChecked = selectedTasks.has(task.task_id) ? 'checked' : '';
            var displayName = task.target;
            var nameDisplay = task.name ? '<div class="task-name">' + task.name + '</div>' : '';

            return '<div class="task-card">' +
                '<input type="checkbox" class="task-checkbox task-item-checkbox" data-task-id="' + task.task_id + '" ' + isChecked + '>' +
                '<div class="task-id">#' + taskIdShort + '</div>' +
                '<div class="task-type">' + targetType + '</div>' +
                '<div class="task-target-wrapper"><div class="task-target">' + displayName + '</div>' +
                nameDisplay +
                '<div class="task-meta">' + timeStr + '</div></div>' +
                '<div class="task-status"><span class="status-dot status-' + normalizeStatus(task.status) + '"></span>' +
                statusInfo.text + '</div>' +
                (task.status === 'running' || task.status === 'scanning' ? '<div class="progress-bar-wrapper"><div class="progress-bar" style="width: ' + (task.progress || 50) + '%"></div></div><div class="progress-text"><span class="spinner"></span>' + (task.progress_text || '扫描中...') + '</div>' : '') +
                '<button class="edit-btn" data-task-id="' + task.task_id + '" title="编辑周期">⚙</button>' +
                '<button class="delete-btn" data-task-id="' + task.task_id + '" title="删除">🗑</button>' +
            '</div>';
        }).join('');

        renderPagination(totalTasks, totalPagesFromAPI);
        bindCheckboxEvents();
        bindDeleteEvents();
    }

    function renderPagination(total, totalPages) {
        var pagination = document.getElementById('pagination');
        if (totalPages <= 1) {
            pagination.classList.add('hidden');
            return;
        }
        pagination.classList.remove('hidden');

        var html = '';
        // 上一页
        html += '<button class="pagination-btn ' + (currentPage === 1 ? 'disabled' : '') + '" data-page="prev">上一页</button>';

        // 页码
        var maxVisible = 5;
        var startPage = Math.max(1, currentPage - 2);
        var endPage = Math.min(totalPages, startPage + maxVisible - 1);
        if (endPage - startPage < maxVisible - 1) {
            startPage = Math.max(1, endPage - maxVisible + 1);
        }

        for (var i = startPage; i <= endPage; i++) {
            html += '<button class="pagination-btn ' + (i === currentPage ? 'active' : '') + '" data-page="' + i + '">' + i + '</button>';
        }

        // 下一页
        html += '<button class="pagination-btn ' + (currentPage === totalPages ? 'disabled' : '') + '" data-page="next">下一页</button>';

        // 信息
        html += '<span class="pagination-info">第 ' + currentPage + '/' + totalPages + ' 页，共 ' + total + ' 条</span>';

        pagination.innerHTML = html;

        // 绑定分页事件
        pagination.querySelectorAll('.pagination-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var page = this.dataset.page;
                var newPage = currentPage;
                if (page === 'prev' && currentPage > 1) {
                    newPage = currentPage - 1;
                } else if (page === 'next' && currentPage < totalPages) {
                    newPage = currentPage + 1;
                } else if (page !== 'prev' && page !== 'next') {
                    newPage = parseInt(page);
                }
                if (newPage !== currentPage) {
                    currentPage = newPage;
                    selectedTasks.clear();
                    updateSelectedCount();
                    renderTasks();
                }
            });
        });

    }

    // 编辑周期弹窗事件监听
    document.getElementById('edit-schedule-type').addEventListener('change', function() {
        var timeGroup = document.getElementById('edit-time-group');
        var datetimeGroup = document.getElementById('edit-datetime-group');
        var dayGroup = document.getElementById('edit-day-group');
        var monthdayGroup = document.getElementById('edit-monthday-group');

        // Hide all first
        timeGroup.style.display = 'none';
        datetimeGroup.style.display = 'none';
        dayGroup.style.display = 'none';
        monthdayGroup.style.display = 'none';

        var val = this.value;
        if (val === 'daily') {
            timeGroup.style.display = 'block';
            updateEditCronPreview();
        } else if (val === 'weekly') {
            timeGroup.style.display = 'block';
            dayGroup.style.display = 'block';
            updateEditCronPreview();
        } else if (val === 'monthly') {
            timeGroup.style.display = 'block';
            monthdayGroup.style.display = 'block';
            updateEditCronPreview();
        } else if (val === 'custom') {
            datetimeGroup.style.display = 'block';
        }
    });

    function updateEditCronPreview() {
        var scheduleType = document.getElementById('edit-schedule-type').value;
        var preview = document.getElementById('edit-cron-preview-time');
        var timeInput = document.getElementById('edit-schedule-time').value || '09:00';
        var parts = timeInput.split(':');
        var hour = parts[0] || '09';
        var minute = parts[1] || '00';

        var cronExpr = '';
        if (scheduleType === 'daily') {
            cronExpr = minute + ' ' + hour + ' * * *';
            preview.textContent = '每天 ' + hour + ':' + minute + ' 执行 (Cron: ' + cronExpr + ')';
        } else if (scheduleType === 'weekly') {
            var day = document.getElementById('edit-schedule-day').value;
            cronExpr = minute + ' ' + hour + ' * * ' + day;
            preview.textContent = '每周指定日 ' + hour + ':' + minute + ' 执行 (Cron: ' + cronExpr + ')';
        } else if (scheduleType === 'monthly') {
            var monthday = document.getElementById('edit-schedule-monthday').value;
            cronExpr = minute + ' ' + hour + ' ' + monthday + ' * *';
            preview.textContent = '每月 ' + monthday + ' 日 ' + hour + ':' + minute + ' 执行 (Cron: ' + cronExpr + ')';
        }
    }

    document.getElementById('edit-schedule-time').addEventListener('change', updateEditCronPreview);
    document.getElementById('edit-schedule-day').addEventListener('change', updateEditCronPreview);
    document.getElementById('edit-schedule-monthday').addEventListener('change', updateEditCronPreview);

    document.getElementById('edit-schedule-datetime').addEventListener('change', function() {
        var preview = document.getElementById('edit-cron-preview');
        if (this.value) {
            var cron = generateCronFromDate(this.value);
            preview.textContent = '生成的 Cron: ' + cron;
        } else {
            preview.textContent = '';
        }
    });

    document.getElementById('schedule-save').addEventListener('click', function() {
        var scheduleType = document.getElementById('edit-schedule-type').value;
        var cronExpr = null;
        if (scheduleType === 'custom') {
            cronExpr = generateCronFromDate(document.getElementById('edit-schedule-datetime').value);
        }
        
        fetch('/api/scan/tasks/' + editingTaskId + '/schedule', {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                schedule_type: scheduleType,
                cron_expr: cronExpr
            })
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
            showToast(data.message || '周期已更新', 'success');
            var overlay = document.getElementById('schedule-overlay'); overlay.style.display = 'none'; overlay.classList.remove('show');
            loadTasks();
        })
        .catch(function() { showToast('更新失败', 'error'); });
    });


    function bindCheckboxEvents() {
        document.querySelectorAll('.task-item-checkbox').forEach(function(cb) {
            cb.addEventListener('change', function() {
                var taskId = this.dataset.taskId;
                if (this.checked) {
                    selectedTasks.add(taskId);
                } else {
                    selectedTasks.delete(taskId);
                }
                updateSelectedCount();
            });
        });

        var selectAllCb = document.getElementById('select-all');
        selectAllCb.addEventListener('change', function() {
            document.querySelectorAll('.task-item-checkbox').forEach(function(cb) {
                cb.checked = selectAllCb.checked;
                var taskId = cb.dataset.taskId;
                if (selectAllCb.checked) {
                    selectedTasks.add(taskId);
                } else {
                    selectedTasks.delete(taskId);
                }
            });
            updateSelectedCount();
        });
    }

    // 通用确认弹窗函数
    function showConfirmDialog(title, message, onConfirm) {
        var overlay = document.getElementById('confirm-overlay');
        var titleEl = document.getElementById('confirm-title');
        var messageEl = document.getElementById('confirm-message');
        var cancelBtn = document.getElementById('confirm-cancel');
        var deleteBtn = document.getElementById('confirm-delete');
        
        titleEl.textContent = title;
        messageEl.textContent = message;
        
        overlay.classList.add('show');
        
        // 清除之前的事件监听器
        cancelBtn.onclick = null;
        deleteBtn.onclick = null;
        overlay.onclick = null;
        
        // 取消按钮
        cancelBtn.onclick = function() {
            overlay.classList.remove('show');
        };
        
        // 点击遮罩层关闭
        overlay.onclick = function(e) {
            if (e.target === overlay) {
                overlay.classList.remove('show');
            }
        };
        
        // 确认按钮
        deleteBtn.onclick = function() {
            overlay.classList.remove('show');
            if (onConfirm) onConfirm();
        };
        
        // ESC键关闭
        document.onkeydown = function(e) {
            if (e.key === 'Escape') {
                overlay.classList.remove('show');
                document.onkeydown = null;
            }
        };
    }

    var editingTaskId = null;
    var selectedSchedule = 'once';


    function generateCronFromDate(dateStr) {
        if (!dateStr) return null;
        var dt = new Date(dateStr);
        var minute = dt.getMinutes();
        var hour = dt.getHours();
        var day = dt.getDate();
        var month = dt.getMonth() + 1;
        return minute + " " + hour + " " + day + " " + month + " *";
    }

    function showScheduleDialog(taskId) {
        editingTaskId = taskId;
        var overlay = document.getElementById('schedule-overlay');
        overlay.style.display = 'flex'; overlay.classList.add('show');
        
        // 重置选择
        document.getElementById('edit-schedule-type').value = 'once';
        document.getElementById('edit-datetime-group').style.display = 'none';
        document.getElementById('edit-schedule-datetime').value = '';
        document.getElementById('edit-cron-preview').textContent = '';
        
        // 点击外部关闭
        overlay.onclick = function(e) {
            if (e.target === overlay) { overlay.style.display = 'none'; overlay.classList.remove('show'); overlay.classList.remove('show'); }
        };
        document.getElementById('schedule-cancel').onclick = function() {
            overlay.style.display = 'none'; overlay.classList.remove('show');
        };
    }
    function bindDeleteEvents() {
        // 编辑周期按钮事件
        document.querySelectorAll('.edit-btn').forEach(function(btn) {
            btn.onclick = function() {
                showScheduleDialog(this.dataset.taskId);
            };
        });
        
        // 删除按钮事件
        document.querySelectorAll('.delete-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var taskId = this.dataset.taskId;
                var shortId = taskId.substring(0, 8);
                showConfirmDialog(
                    '确认删除',
                    '确定要删除任务 #' + shortId + ' 吗？此操作不可恢复。',
                    function() { deleteTask(taskId); }
                );
            });
        });

        var batchDeleteBtn = document.getElementById('batch-delete-btn');
        batchDeleteBtn.addEventListener('click', function() {
            if (selectedTasks.size === 0) return;
            showConfirmDialog(
                '确认批量删除',
                '确定要删除选中的 ' + selectedTasks.size + ' 个任务吗？此操作不可恢复。',
                function() { batchDeleteTasks(Array.from(selectedTasks)); }
            );
        });
    }

    function updateSelectedCount() {
        var count = selectedTasks.size;
        document.getElementById('selected-count').textContent = '已选择 ' + count + ' 个';
        document.getElementById('batch-delete-btn').disabled = count === 0;

        var checkboxes = document.querySelectorAll('.task-item-checkbox');
        var allChecked = checkboxes.length > 0 && Array.from(checkboxes).every(function(cb) { return cb.checked; });
        document.getElementById('select-all').checked = allChecked;
    }

    function deleteTask(taskId) {
        fetch('/api/scan/tasks/' + taskId, {
            method: 'DELETE'
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
            showToast('任务已删除', 'success');
            selectedTasks.delete(taskId);
            loadTasks();
        })
        .catch(function(err) {
            showToast('删除失败', 'error');
        });
    }

    function batchDeleteTasks(taskIds) {
        var btn = document.getElementById('batch-delete-btn');
        btn.disabled = true;
        btn.textContent = '删除中...';

        fetch('/api/scan/tasks/batch', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ids: taskIds})
        })
        .then(function(res) {
            return res.json().then(function(data) {
                if (!res.ok) {
                    throw new Error(data.detail || '删除失败');
                }
                return data;
            });
        })
        .then(function(data) {
            showToast(data.message || '已删除 ' + data.deleted + ' 个任务', 'success');
            selectedTasks.clear();
            loadTasks();
        })
        .catch(function(err) {
            showToast('批量删除失败: ' + err.message, 'error');
            console.error('Batch delete error:', err);
        })
        .finally(function() {
            btn.disabled = false;
            btn.textContent = '批量删除';
            updateSelectedCount();
        });
    }

    function normalizeStatus(status) {
        if (status === 'scanning') return 'running';
        if (status === 'pending') return 'queued';
        return status;
    }

    function getStatusInfo(status) {
        var map = {
            'queued': { text: '排队中', color: '#f59e0b' },
            'pending': { text: '排队中', color: '#f59e0b' },
            'running': { text: '运行中', color: '#3b82f6' },
            'scanning': { text: '运行中', color: '#3b82f6' },
            'completed': { text: '已完成', color: '#22c55e' },
            'failed': { text: '失败', color: '#ef4444' }
        };
        return map[status] || { text: status, color: '#6b7280' };
    }

    function formatTime(dateStr) {
        if (!dateStr) return '-';
        var d = new Date(dateStr);
        return d.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    }

    function updateCounts() {
        var counts = { all: allTasks.length, queued: 0, running: 0, completed: 0, failed: 0 };
        allTasks.forEach(function(t) {
            if (t.status === 'queued' || t.status === 'pending') counts.queued++;
            else if (t.status === 'running' || t.status === 'scanning') counts.running++;
            else if (t.status === 'completed') counts.completed++;
            else if (t.status === 'failed') counts.failed++;
        });

        // Update count badges in tab cards
        var el = document.getElementById('count-all');
        if (el) el.textContent = counts.all;
        el = document.getElementById('count-queued');
        if (el) el.textContent = counts.queued;
        el = document.getElementById('count-running');
        if (el) el.textContent = counts.running;
        el = document.getElementById('count-completed');
        if (el) el.textContent = counts.completed;
        el = document.getElementById('count-failed');
        if (el) el.textContent = counts.failed;

        // Legacy
        var tc = document.getElementById('task-count');
        if (tc) tc.textContent = '共 ' + counts.all + ' 个扫描任务';
    }

    function getTabText(filter) {
        var map = { queued: '排队中', running: '运行中', completed: '已完成', failed: '失败' };
        return map[filter] || filter;
    }

    document.querySelectorAll('.task-tab').forEach(function(tab) {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.task-tab').forEach(function(t) { t.classList.remove('active'); });
            tab.classList.add('active');
            currentFilter = tab.dataset.filter;
            currentPage = 1;  // 切换标签时回到第一页
            selectedTasks.clear();
            updateSelectedCount();
            renderTasks();
        });
    });

    loadTasks();
    pollInterval = setInterval(loadTasks, 3000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网络设备发现平台 - 扫描任务</title>
    <link rel="stylesheet" href="/static/css/style.css?v=0.9.9-fix6">
    <style>
        .task-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .task-tab {
            padding: 8px 16px;
            border-radius: 8px;
            background: var(--bg-card);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border-color);
            font-size: 14px;
        }
        .task-tab.active {
            background: var(--accent-cyan);
            color: var(--bg-primary);
            border-color: var(--accent-cyan);
        }
        .task-tab:hover:not(.active) {
            background: var(--bg-card-hover);
        }
        .task-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border-color);
            display: grid;
            grid-template-columns: 32px 90px 90px 1fr 100px 40px;
            gap: 12px;
            align-items: center;
        }
        .task-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--accent-cyan);
            vertical-align: middle;
        }
        .task-id {
            font-size: 12px;
            color: var(--text-muted);
            text-align: left;
        }
        .task-type {
            font-size: 13px;
            color: var(--text-secondary);
            text-align: left;
        }
        .task-target-wrapper {
            text-align: left;
            min-width: 0;
        }
        .task-target {
            font-size: 14px;
            color: var(--text-primary);
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .task-name {
            font-size: 12px;
            color: var(--accent-cyan);
            margin-top: 2px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .task-status {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 6px;
            font-size: 13px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .status-queued { background: #f59e0b; }
        .status-running { background: #3b82f6; animation: pulse 1.5s infinite; }
        .status-completed { background: #22c55e; }
        .status-failed { background: #ef4444; }
        .task-meta {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .delete-btn {
            padding: 4px 8px;
            background: transparent;
            color: var(--text-muted);
            border: none;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
            text-align: center;
        }
        .delete-btn:hover {
            color: #ef4444;
        }
        .empty-state-task {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .empty-state-task a {
            color: var(--accent-cyan);
            text-decoration: none;
        }
        .page-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        #new-task-btn {
            padding: 8px 16px;
            background: var(--accent-cyan);
            color: var(--bg-primary);
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s;
        }
        #new-task-btn:hover {
            background: #00d4aa;
            transform: translateY(-1px);
        }
        .batch-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding: 8px 16px;
            background: var(--bg-card);
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }
        .batch-actions.hidden {
            display: none;
        }
        .batch-delete-btn {
            padding: 6px 16px;
            background: #ef4444;
            color: #fff;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .batch-delete-btn:hover {
            background: #dc2626;
        }
        .batch-delete-btn:disabled {
            background: #6b7280;
            cursor: not-allowed;
        }
        .select-all-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .selected-count {
            color: var(--text-secondary);
            font-size: 13px;
        }
        /* 分页样式 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 20px;
            padding: 16px;
        }
        .pagination-btn {
            padding: 6px 12px;
            border-radius: 6px;
            background: var(--bg-card);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .pagination-btn:hover:not(.disabled) {
            background: var(--bg-card-hover);
            color: var(--text-primary);
        }
        .pagination-btn.active {
            background: var(--accent-cyan);
            color: var(--bg-primary);
            border-color: var(--accent-cyan);
        }
        .pagination-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .pagination-info {
            color: var(--text-secondary);
            font-size: 13px;
        }

        /* 确认弹窗样式 */
        .confirm-overlay {
            pointer-events: none;  /* 隐藏时不拦截点击 */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .confirm-overlay.show {
            pointer-events: auto;  /* 显示时恢复拦截 */
            opacity: 1;
        }
        .confirm-dialog {
            background: #1e2d3d;
            border-radius: 12px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: scale(0.95);
            transition: transform 0.2s;
        }
        .confirm-overlay.show .confirm-dialog {
            transform: scale(1);
        }
        .confirm-title {
            font-size: 18px;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 12px;
        }
        .confirm-message {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        .confirm-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        .confirm-btn-cancel {
            padding: 10px 20px;
            border-radius: 8px;
            background: transparent;
            color: #94a3b8;
            border: 1px solid #475569;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .confirm-btn-cancel:hover {
            background: #334155;
            color: #f1f5f9;
        }
        .confirm-btn-delete {
            padding: 10px 20px;
            border-radius: 8px;
            background: #ef4444;
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .confirm-btn-delete:hover {
            background: #dc2626;
        }
        .confirm-btn-delete:disabled {
            background: #6b7280;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="brand">网络设备发现平台 <span id="app-version"></span></div>
        <div class="links">
            <a href="/index.html">仪表盘</a>
            <a href="/scan.html">扫描</a>
            <a href="/assets.html">资产</a>
            <a href="/tasks.html" class="active">扫描任务</a>
        </div>
    </nav>

    
    <!-- 确认弹窗 -->
    <div class="confirm-overlay" id="confirm-overlay">
        <div class="confirm-dialog">
            <div class="confirm-title" id="confirm-title">确认删除</div>
            <div class="confirm-message" id="confirm-message"></div>
            <div class="confirm-buttons">
                <button class="confirm-btn-cancel" id="confirm-cancel">取消</button>
                <button class="confirm-btn-delete" id="confirm-delete">确认删除</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="page-content">
            <div class="page-header-row">
                <div class="page-title">扫描任务</div>
                <a href="/scan.html" class="btn-primary" id="new-task-btn">+ 新建扫描任务</a>
            </div>
            <div class="page-subtitle" id="task-count">加载中...</div>

            <div class="batch-actions hidden" id="batch-actions">
                <div class="select-all-wrapper">
                    <input type="checkbox" id="select-all" class="task-checkbox">
                    <label for="select-all" style="font-size: 13px; color: var(--text-secondary);">全选</label>
                </div>
                <span class="selected-count" id="selected-count">已选择 0 个</span>
                <button class="batch-delete-btn" id="batch-delete-btn" disabled>批量删除</button>
            </div>

            <div class="task-tabs">
                <div class="task-tab active" data-filter="all">全部</div>
                <div class="task-tab" data-filter="queued">排队中</div>
                <div class="task-tab" data-filter="running">运行中</div>
                <div class="task-tab" data-filter="completed">已完成</div>
                <div class="task-tab" data-filter="failed">失败</div>
            </div>

            <div id="task-list">加载中...</div>
            <div class="pagination hidden" id="pagination"></div>
        </div>
    </div>

    <script src="/static/js/app.js?v=0.9.9-fix6"></script>
    <script>
    var currentFilter = 'all';
    var allTasks = [];
    var lastTasksJSON = '';
    var pollInterval = null;
    var selectedTasks = new Set();
    var currentPage = 1;
    var pageSize = 10;

    function loadTasks() {
        fetch('/api/scan/tasks?page=' + currentPage + '&page_size=' + pageSize)
        .then(function(res) { return res.json(); })
        .then(function(data) {
            var newTasks = data.tasks || [];
            var newJSON = JSON.stringify(newTasks.map(function(t) {
                return { id: t.task_id, status: t.status, target: t.target, name: t.name, time: t.created_at };
            }));

            if (newJSON !== lastTasksJSON) {
                lastTasksJSON = newJSON;
                allTasks = newTasks;
                currentPage = 1;  // 数据变化时回到第一页
                renderTasks();
                updateCounts();
            }
        })
        .catch(function(err) {
            console.error('加载任务失败:', err);
            document.getElementById('task-list').innerHTML =
                '<div class="empty-state-task">加载失败，请刷新页面</div>';
        });
    }

    function getFilteredTasks() {
        if (currentFilter === 'all') {
            return allTasks;
        }
        return allTasks.filter(function(t) {
            // 排队中：queued 和 pending
            if (currentFilter === 'queued') {
                return t.status === 'queued' || t.status === 'pending';
            }
            // 运行中：running 和 scanning（不含 pending）
            if (currentFilter === 'running') {
                return t.status === 'running' || t.status === 'scanning';
            }
            return t.status === currentFilter;
        });
    }

    function renderTasks() {
        var filtered = getFilteredTasks();
        var totalPages = Math.ceil(filtered.length / pageSize);
        if (currentPage > totalPages && totalPages > 0) {
            currentPage = totalPages;
        }

        var startIndex = (currentPage - 1) * pageSize;
        var endIndex = startIndex + pageSize;
        var pageTasks = filtered.slice(startIndex, endIndex);

        var container = document.getElementById('task-list');

        if (filtered.length === 0) {
            container.innerHTML = '<div class="empty-state-task">暂无扫描任务<br><br><a href="/scan.html">去创建一个 →</a></div>';
            document.getElementById('batch-actions').classList.add('hidden');
            document.getElementById('pagination').classList.add('hidden');
            return;
        }

        document.getElementById('batch-actions').classList.remove('hidden');

        container.innerHTML = pageTasks.map(function(task) {
            var statusInfo = getStatusInfo(task.status);
            var taskIdShort = task.task_id ? task.task_id.substring(0, 12) : 'N/A';
            var targetType = task.target.includes('/') ? '网段' : '单IP';
            var timeStr = formatTime(task.created_at);
            var isChecked = selectedTasks.has(task.task_id) ? 'checked' : '';
            var displayName = task.name ? task.name : task.target;
            var nameDisplay = task.name ? '<div class="task-name">' + task.name + '</div>' : '';

            return '<div class="task-card">' +
                '<input type="checkbox" class="task-checkbox task-item-checkbox" data-task-id="' + task.task_id + '" ' + isChecked + '>' +
                '<div class="task-id">#' + taskIdShort + '</div>' +
                '<div class="task-type">' + targetType + '</div>' +
                '<div class="task-target-wrapper"><div class="task-target">' + displayName + '</div>' +
                nameDisplay +
                '<div class="task-meta">' + timeStr + '</div></div>' +
                '<div class="task-status"><span class="status-dot status-' + normalizeStatus(task.status) + '"></span>' +
                statusInfo.text + '</div>' +
                '<button class="delete-btn" data-task-id="' + task.task_id + '" title="删除">🗑</button>' +
            '</div>';
        }).join('');

        renderPagination(filtered.length, totalPages);
        bindCheckboxEvents();
        bindDeleteEvents();
    }

    function renderPagination(total, totalPages) {
        var pagination = document.getElementById('pagination');
        if (totalPages <= 1) {
            pagination.classList.add('hidden');
            return;
        }
        pagination.classList.remove('hidden');

        var html = '';
        // 上一页
        html += '<button class="pagination-btn ' + (currentPage === 1 ? 'disabled' : '') + '" data-page="prev">上一页</button>';

        // 页码
        var maxVisible = 5;
        var startPage = Math.max(1, currentPage - 2);
        var endPage = Math.min(totalPages, startPage + maxVisible - 1);
        if (endPage - startPage < maxVisible - 1) {
            startPage = Math.max(1, endPage - maxVisible + 1);
        }

        for (var i = startPage; i <= endPage; i++) {
            html += '<button class="pagination-btn ' + (i === currentPage ? 'active' : '') + '" data-page="' + i + '">' + i + '</button>';
        }

        // 下一页
        html += '<button class="pagination-btn ' + (currentPage === totalPages ? 'disabled' : '') + '" data-page="next">下一页</button>';

        // 信息
        html += '<span class="pagination-info">第 ' + currentPage + '/' + totalPages + ' 页，共 ' + total + ' 条</span>';

        pagination.innerHTML = html;

        // 绑定分页事件
        pagination.querySelectorAll('.pagination-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var page = this.dataset.page;
                if (page === 'prev' && currentPage > 1) {
                    currentPage--;
                } else if (page === 'next' && currentPage < totalPages) {
                    currentPage++;
                } else if (page !== 'prev' && page !== 'next') {
                    currentPage = parseInt(page);
                }
                selectedTasks.clear();
                updateSelectedCount();
                renderTasks();
            });
        });
    }

    function bindCheckboxEvents() {
        document.querySelectorAll('.task-item-checkbox').forEach(function(cb) {
            cb.addEventListener('change', function() {
                var taskId = this.dataset.taskId;
                if (this.checked) {
                    selectedTasks.add(taskId);
                } else {
                    selectedTasks.delete(taskId);
                }
                updateSelectedCount();
            });
        });

        var selectAllCb = document.getElementById('select-all');
        selectAllCb.addEventListener('change', function() {
            document.querySelectorAll('.task-item-checkbox').forEach(function(cb) {
                cb.checked = selectAllCb.checked;
                var taskId = cb.dataset.taskId;
                if (selectAllCb.checked) {
                    selectedTasks.add(taskId);
                } else {
                    selectedTasks.delete(taskId);
                }
            });
            updateSelectedCount();
        });
    }

    // 通用确认弹窗函数
    function showConfirmDialog(title, message, onConfirm) {
        var overlay = document.getElementById('confirm-overlay');
        var titleEl = document.getElementById('confirm-title');
        var messageEl = document.getElementById('confirm-message');
        var cancelBtn = document.getElementById('confirm-cancel');
        var deleteBtn = document.getElementById('confirm-delete');
        
        titleEl.textContent = title;
        messageEl.textContent = message;
        
        overlay.classList.add('show');
        
        // 清除之前的事件监听器
        cancelBtn.onclick = null;
        deleteBtn.onclick = null;
        overlay.onclick = null;
        
        // 取消按钮
        cancelBtn.onclick = function() {
            overlay.classList.remove('show');
        };
        
        // 点击遮罩层关闭
        overlay.onclick = function(e) {
            if (e.target === overlay) {
                overlay.classList.remove('show');
            }
        };
        
        // 确认按钮
        deleteBtn.onclick = function() {
            overlay.classList.remove('show');
            if (onConfirm) onConfirm();
        };
        
        // ESC键关闭
        document.onkeydown = function(e) {
            if (e.key === 'Escape') {
                overlay.classList.remove('show');
                document.onkeydown = null;
            }
        };
    }

    function bindDeleteEvents() {
        document.querySelectorAll('.delete-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var taskId = this.dataset.taskId;
                var shortId = taskId.substring(0, 8);
                showConfirmDialog(
                    '确认删除',
                    '确定要删除任务 #' + shortId + ' 吗？此操作不可恢复。',
                    function() { deleteTask(taskId); }
                );
            });
        });

        var batchDeleteBtn = document.getElementById('batch-delete-btn');
        batchDeleteBtn.addEventListener('click', function() {
            if (selectedTasks.size === 0) return;
            showConfirmDialog(
                '确认批量删除',
                '确定要删除选中的 ' + selectedTasks.size + ' 个任务吗？此操作不可恢复。',
                function() { batchDeleteTasks(Array.from(selectedTasks)); }
            );
        });
    }

    function updateSelectedCount() {
        var count = selectedTasks.size;
        document.getElementById('selected-count').textContent = '已选择 ' + count + ' 个';
        document.getElementById('batch-delete-btn').disabled = count === 0;

        var checkboxes = document.querySelectorAll('.task-item-checkbox');
        var allChecked = checkboxes.length > 0 && Array.from(checkboxes).every(function(cb) { return cb.checked; });
        document.getElementById('select-all').checked = allChecked;
    }

    function deleteTask(taskId) {
        fetch('/api/scan/tasks/' + taskId, {
            method: 'DELETE'
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
            showToast('任务已删除', 'success');
            selectedTasks.delete(taskId);
            loadTasks();
        })
        .catch(function(err) {
            showToast('删除失败', 'error');
        });
    }

    function batchDeleteTasks(taskIds) {
        var btn = document.getElementById('batch-delete-btn');
        btn.disabled = true;
        btn.textContent = '删除中...';

        fetch('/api/scan/tasks/batch', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ids: taskIds})
        })
        .then(function(res) {
            return res.json().then(function(data) {
                if (!res.ok) {
                    throw new Error(data.detail || '删除失败');
                }
                return data;
            });
        })
        .then(function(data) {
            showToast(data.message || '已删除 ' + data.deleted + ' 个任务', 'success');
            selectedTasks.clear();
            loadTasks();
        })
        .catch(function(err) {
            showToast('批量删除失败: ' + err.message, 'error');
            console.error('Batch delete error:', err);
        })
        .finally(function() {
            btn.disabled = false;
            btn.textContent = '批量删除';
            updateSelectedCount();
        });
    }

    function normalizeStatus(status) {
        if (status === 'scanning') return 'running';
        if (status === 'pending') return 'queued';
        return status;
    }

    function getStatusInfo(status) {
        var map = {
            'queued': { text: '排队中', color: '#f59e0b' },
            'pending': { text: '排队中', color: '#f59e0b' },
            'running': { text: '运行中', color: '#3b82f6' },
            'scanning': { text: '运行中', color: '#3b82f6' },
            'completed': { text: '已完成', color: '#22c55e' },
            'failed': { text: '失败', color: '#ef4444' }
        };
        return map[status] || { text: status, color: '#6b7280' };
    }

    function formatTime(dateStr) {
        if (!dateStr) return '-';
        var d = new Date(dateStr);
        return d.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    }

    function updateCounts() {
        var counts = { all: allTasks.length, queued: 0, running: 0, completed: 0, failed: 0 };
        allTasks.forEach(function(t) {
            // queued 标签页包含 queued 和 pending
            if (t.status === 'queued' || t.status === 'pending') counts.queued++;
            // running 标签页包含 running 和 scanning
            else if (t.status === 'running' || t.status === 'scanning') counts.running++;
            else if (t.status === 'completed') counts.completed++;
            else if (t.status === 'failed') counts.failed++;
        });

        document.getElementById('task-count').textContent = '共 ' + counts.all + ' 个扫描任务';

        document.querySelectorAll('.task-tab').forEach(function(tab) {
            var filter = tab.dataset.filter;
            var count = counts[filter];
            tab.textContent = tab.dataset.filter === 'all' ? '全部(' + count + ')' :
                getTabText(filter) + '(' + count + ')';
        });
    }

    function getTabText(filter) {
        var map = { queued: '排队中', running: '运行中', completed: '已完成', failed: '失败' };
        return map[filter] || filter;
    }

    document.querySelectorAll('.task-tab').forEach(function(tab) {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.task-tab').forEach(function(t) { t.classList.remove('active'); });
            tab.classList.add('active');
            currentFilter = tab.dataset.filter;
            currentPage = 1;  // 切换标签时回到第一页
            selectedTasks.clear();
            updateSelectedCount();
            renderTasks();
        });
    });

    loadTasks();
    pollInterval = setInterval(loadTasks, 3000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网络设备发现平台 - 资产清单</title>
    <link rel="stylesheet" href="/static/css/style.css?v=0.10.1">
    <style>
    .btn-delete {
        padding: 4px 12px;
        border-radius: 6px;
        background: transparent;
        color: #ef4444;
        border: 1px solid #ef4444;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 13px;
    }
    .btn-delete:hover {
        background: #ef4444;
        color: white;
    }
    /* 分页样式 */
    .pagination {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        margin-top: 20px;
        padding: 16px;
    }
    .pagination-btn {
        padding: 6px 12px;
        border-radius: 6px;
        background: var(--bg-card);
        color: var(--text-secondary);
        border: 1px solid var(--border-color);
        cursor: pointer;
        font-size: 13px;
        transition: all 0.2s;
    }
    .pagination-btn:hover:not(.disabled) {
        background: var(--bg-card-hover);
        color: var(--text-primary);
    }
    .pagination-btn.active {
        background: var(--accent-cyan);
        color: var(--bg-primary);
        border-color: var(--accent-cyan);
    }
    .pagination-btn.disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }
    .pagination-info {
        color: var(--text-secondary);
        font-size: 13px;
    }
    
    /* 确认弹窗样式 */
    .confirm-overlay {
        pointer-events: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.2s;
    }
    .confirm-overlay.show {
        pointer-events: auto;
        opacity: 1;
    }
    .confirm-dialog {
        background: #1e2d3d;
        border-radius: 12px;
        padding: 24px;
        max-width: 400px;
        width: 90%;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        transform: scale(0.95);
        transition: transform 0.2s;
    }
    .confirm-overlay.show .confirm-dialog {
        transform: scale(1);
    }
    .confirm-title {
        font-size: 18px;
        font-weight: 600;
        color: #f1f5f9;
        margin-bottom: 12px;
    }
    .confirm-message {
        font-size: 14px;
        color: #94a3b8;
        margin-bottom: 24px;
        line-height: 1.5;
    }
    .confirm-buttons {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
    }
    .confirm-btn-cancel {
        padding: 10px 20px;
        border-radius: 8px;
        background: transparent;
        color: #94a3b8;
        border: 1px solid #475569;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.2s;
    }
    .confirm-btn-cancel:hover {
        background: #334155;
        color: #f1f5f9;
    }
    .confirm-btn-delete {
        padding: 10px 20px;
        border-radius: 8px;
        background: #ef4444;
        color: #fff;
        border: none;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.2s;
    }
    .confirm-btn-delete:hover {
        background: #dc2626;
    }
    .batch-actions {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
        padding: 8px 16px;
        background: var(--bg-card);
        border-radius: 8px;
        border: 1px solid var(--border-color);
    }
    .batch-actions.hidden {
        display: none;
    }
    .batch-delete-btn {
        padding: 6px 16px;
        background: #ef4444;
        color: #fff;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
        border: none;
        transition: all 0.2s;
    }
    .batch-delete-btn:hover {
        background: #dc2626;
    }
    .batch-delete-btn:disabled {
        background: #6b7280;
        cursor: not-allowed;
    }
    .selected-count {
        color: var(--text-secondary);
        font-size: 13px;
    }
    .asset-checkbox {
        width: 18px;
        height: 18px;
        cursor: pointer;
        accent-color: var(--accent-cyan);
    }
</style>
</head>
<body>
    <nav class="navbar">
        <div class="brand">网络设备发现平台 <span id="app-version"></span></div>
        <div class="links">
            <a href="/index.html">仪表盘</a>
            <a href="/scan.html">扫描</a>
            <a href="/assets.html" class="active">资产</a>
            <a href="/tasks.html">扫描任务</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-content">
            <div class="page-title">资产清单</div>
            <div class="page-subtitle" id="asset-count">已发现资产加载中...</div>

            <div class="filter-bar">
                <div class="filter-input">
                    <input type="text" class="input" id="search-input" placeholder="搜索 IP 或主机名...">
                </div>
                <div class="filter-input">
                    <select class="select" id="status-filter">
                        <option value="">全部状态</option>
                        <option value="up">在线</option>
                        <option value="down">离线</option>
                        <option value="unknown">未知</option>
                    </select>
                </div>
                <button class="filter-btn" onclick="loadAssets()">搜索</button>
                <button class="btn-secondary" onclick="exportCSV()">导出 CSV</button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th><input type=checkbox class=asset-checkbox id=select-all-assets></th>
                            <th>IP 地址</th>
                            <th>状态</th>
                            <th>主机名</th>
                            <th>操作系统</th>
                            <th>厂商</th>
                            <th>开放端口</th>
                            <th>最后扫描时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="assets-table">
                        <tr><td colspan="8" class="loading">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination hidden" id="pagination"></div>

            <!-- 批量操作栏 -->
            <div class="batch-actions hidden" id="batch-actions">
                <span class="selected-count" id="selected-count">已选择 0 个</span>
                <button class="batch-delete-btn" id="batch-delete-btn" disabled>批量删除</button>
            </div>
        </div>
    </div>


    <!-- 确认删除弹窗 -->
    <div class="confirm-overlay" id="confirm-overlay">
        <div class="confirm-dialog">
            <div class="confirm-title" id="confirm-title">确认删除</div>
            <div class="confirm-message" id="confirm-message"></div>
            <div class="confirm-buttons">
                <button class="confirm-btn-cancel" id="confirm-cancel">取消</button>
                <button class="confirm-btn-delete" id="confirm-delete">确认删除</button>
            </div>
        </div>
    </div>
    <script src="/static/js/app.js?v=0.10.1"></script>
    <script>
    var currentPage = 1;
    var pageSize = 10;
    var totalAssets = 0;
    var selectedAssets = new Set();

    function formatDateTime(dateStr) {
        if (!dateStr) return '-';
        var date = new Date(dateStr);
        return date.toLocaleString('zh-CN');
    }

    function showConfirmDialog(title, message, onConfirm) {
        var overlay = document.getElementById("confirm-overlay");
        document.getElementById("confirm-title").textContent = title;
        document.getElementById("confirm-message").textContent = message;
        overlay.classList.add("show");
        document.getElementById("confirm-cancel").onclick = function() { overlay.classList.remove("show"); }; 
        overlay.onclick = function(e) { if (e.target === overlay) overlay.classList.remove("show"); }; 
        document.getElementById("confirm-delete").onclick = function() { overlay.classList.remove("show"); if (onConfirm) onConfirm(); }; 
    }

    function deleteAsset(ip) {
        showConfirmDialog("确认删除", "确定要删除设备 " + ip + " 吗？此操作不可恢复。", function() { 
            fetch("/api/assets/" + ip, { method: "DELETE" }) 
            .then(function(res) { 
                if (res.ok) { showToast("已删除 " + ip, "success"); selectedAssets.delete(ip); loadAssets(); } 
                else if (res.status === 404) { showToast("资产不存在", "error"); } 
                else { showToast("删除失败", "error"); } 
            }) 
            .catch(function() { showToast("删除失败: 网络错误", "error"); }); 
        });
    }

    function batchDeleteAssets() {
        if (selectedAssets.size === 0) return;
        showConfirmDialog("确认批量删除", "确定要删除选中的 " + selectedAssets.size + " 个资产吗？", function() { 
            var btn = document.getElementById("batch-delete-btn");
            btn.disabled = true; btn.textContent = "删除中..."; 
            fetch("/api/assets/batch", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({ids: Array.from(selectedAssets)}) }) 
            .then(function(res) { return res.json(); }) 
            .then(function(data) { showToast(data.message || "已删除 " + data.deleted + " 个", "success"); selectedAssets.clear(); loadAssets(); }) 
            .catch(function() { showToast("批量删除失败", "error"); }) 
            .finally(function() { btn.disabled = false; btn.textContent = "批量删除"; updateBatchActions(); }); 
        });
    }

    function updateBatchActions() {
        var count = selectedAssets.size;
        document.getElementById("selected-count").textContent = "已选择 " + count + " 个"; 
        document.getElementById("batch-delete-btn").disabled = count === 0;
        if (count > 0) document.getElementById("batch-actions").classList.remove("hidden"); 
        else document.getElementById("batch-actions").classList.add("hidden"); 
    }
    function loadAssets() {
        var searchInput = document.getElementById('search-input').value;
        var statusFilter = document.getElementById('status-filter').value;

        var url = '/api/assets/?page=' + currentPage + '&page_size=' + pageSize;
        if (searchInput) url += '&search=' + encodeURIComponent(searchInput);
        if (statusFilter) url += '&status=' + encodeURIComponent(statusFilter);

        fetch(url)
        .then(function(res) { return res.json(); })
        .then(function(data) {
            totalAssets = data.total || 0;
            document.getElementById('asset-count').textContent = '已发现 ' + totalAssets + ' 个资产';

            var tbody = document.getElementById('assets-table');
            if (data.assets.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="empty-state">暂无发现资产，执行扫描后将自动显示</td></tr>';
                document.getElementById('pagination').classList.add('hidden');
                return;
            }

            tbody.innerHTML = '';
            data.assets.forEach(function(asset) {
                var tr = document.createElement('tr');

                var checkboxTd = document.createElement('td');
                var checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'asset-checkbox asset-item-checkbox';
                checkbox.dataset.ip = asset.ip;
                checkbox.checked = selectedAssets.has(asset.ip);
                checkbox.onchange = function() {
                    if (this.checked) selectedAssets.add(this.dataset.ip);
                    else selectedAssets.delete(this.dataset.ip);
                    updateBatchActions();
                };
                checkboxTd.appendChild(checkbox);
                tr.appendChild(checkboxTd);

                var ipTd = document.createElement('td');
                var ipLink = document.createElement('a');
                ipLink.href = '/asset/' + asset.ip;
                ipLink.textContent = asset.ip;
                ipLink.style.color = 'var(--accent-cyan)';
                ipLink.style.textDecoration = 'none';
                ipTd.appendChild(ipLink);
                tr.appendChild(ipTd);

                var statusTd = document.createElement('td');
                var statusClass = 'unknown';
                var statusText = '未知';
                if (asset.status === 'up' || asset.status === 'online') {
                    statusClass = 'online';
                    statusText = '在线';
                } else if (asset.status === 'down' || asset.status === 'offline') {
                    statusClass = 'offline';
                    statusText = '离线';
                }
                statusTd.innerHTML = '<span class="status-badge ' + statusClass + '"><span class="status-dot"></span> ' + statusText + '</span>';
                tr.appendChild(statusTd);

                tr.innerHTML += '<td>' + (asset.hostname || '-') + '</td>';
                tr.innerHTML += '<td>' + (asset.os_name || '-') + '</td>';
                tr.innerHTML += '<td>' + (asset.vendor || '-') + '</td>';

                var portCount = asset.open_ports ? asset.open_ports.length : 0;
                var portDisplay = '-';
                if (portCount > 0) {
                    portDisplay = asset.open_ports.slice(0, 5).map(function(p) {
                        if (typeof p === 'object') return p.port + '/' + p.protocol;
                        return p;
                    }).join(', ');
                    if (portCount > 5) portDisplay += '...';
                }
                tr.innerHTML += '<td>' + portDisplay + '</td>';

                tr.innerHTML += '<td>' + formatDateTime(asset.last_scan_at) + '</td>';

                var actionTd = document.createElement('td');
                var deleteBtn = document.createElement('button');
                deleteBtn.className = 'btn-delete';
                deleteBtn.textContent = '删除';
                deleteBtn.onclick = function() { deleteAsset(asset.ip); };
                actionTd.appendChild(deleteBtn);
                tr.appendChild(actionTd);

                tbody.appendChild(tr);
            });

            renderPagination();
            bindBatchEvents();
        })
        .catch(function(error) {
            console.error('加载资产失败:', error);
            document.getElementById('assets-table').innerHTML = '<tr><td colspan="8" class="empty-state">加载失败</td></tr>';
        });
    }

    function renderPagination() {
        var totalPages = Math.ceil(totalAssets / pageSize);
        var pagination = document.getElementById('pagination');

        if (totalPages <= 1) {
            pagination.classList.add('hidden');
            return;
        }
        pagination.classList.remove('hidden');

        var html = '';
        html += '<button class="pagination-btn ' + (currentPage === 1 ? 'disabled' : '') + '" data-page="prev">上一页</button>';

        var maxVisible = 5;
        var startPage = Math.max(1, currentPage - 2);
        var endPage = Math.min(totalPages, startPage + maxVisible - 1);
        if (endPage - startPage < maxVisible - 1) {
            startPage = Math.max(1, endPage - maxVisible + 1);
        }

        for (var i = startPage; i <= endPage; i++) {
            html += '<button class="pagination-btn ' + (i === currentPage ? 'active' : '') + '" data-page="' + i + '">' + i + '</button>';
        }

        html += '<button class="pagination-btn ' + (currentPage === totalPages ? 'disabled' : '') + '" data-page="next">下一页</button>';
        html += '<span class="pagination-info">第 ' + currentPage + '/' + totalPages + ' 页，共 ' + totalAssets + ' 条</span>';

        pagination.innerHTML = html;

        pagination.querySelectorAll('.pagination-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var page = this.dataset.page;
                if (page === 'prev' && currentPage > 1) {
                    currentPage--;
                } else if (page === 'next' && currentPage < totalPages) {
                    currentPage++;
                } else if (page !== 'prev' && page !== 'next') {
                    currentPage = parseInt(page);
                }
                loadAssets();
            });
        });
    }

    function bindBatchEvents() {
        document.getElementById('batch-delete-btn').onclick = batchDeleteAssets;
        var selectAll = document.getElementById('select-all-assets');
        selectAll.checked = false;
        selectAll.onchange = function() {
            document.querySelectorAll('.asset-item-checkbox').forEach(function(cb) {
                cb.checked = selectAll.checked;
                if (selectAll.checked) selectedAssets.add(cb.dataset.ip);
                else selectedAssets.delete(cb.dataset.ip);
            });
            updateBatchActions();
        };
    }

    function exportCSV() {
        window.location.href = "/api/assets/export";
    }

    document.getElementById('search-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            currentPage = 1;
            loadAssets();
        }
    });

    document.getElementById('status-filter').addEventListener('change', function() {
        currentPage = 1;
        loadAssets();
    });

    loadAssets();
    </script>
</body>
</html>

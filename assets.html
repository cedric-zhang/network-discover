<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网络设备发现平台 - 资产清单</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar">
        <div class="brand">网络设备发现平台 <span id="app-version"></span></div>
        <div class="links">
            <a href="/index.html">仪表盘</a>
            <a href="/scan.html">扫描</a>
            <a href="/assets.html" class="active">资产</a>
            <a href="/schedules.html">计划</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-content">
            <div class="page-title">资产清单</div>
            <div class="page-subtitle" id="asset-count">已发现资产加载中...</div>

            <!-- 筛选栏 -->
            <div class="filter-bar">
                <div class="filter-input">
                    <input type="text" class="input" id="search-input" placeholder="搜索 IP 或主机名...">
                </div>
                <div class="filter-input">
                    <select class="select" id="status-filter">
                        <option value="">全部状态</option>
                        <option value="up">在线</option>
                        <option value="down">离线</option>
                        <option value="unknown">未知</option>
                    </select>
                </div>
                <button class="filter-btn" onclick="loadAssets()">搜索</button> <button class="btn-secondary" onclick="exportCSV()">导出 CSV</button>
            </div>

            <!-- 表格 -->
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>IP 地址</th>
                            <th>状态</th>
                            <th>主机名</th>
                            <th>操作系统</th>
                            <th>厂商</th>
                            <th>开放端口</th>
                            <th>最后扫描时间</th>
                        </tr>
                    </thead>
                    <tbody id="assets-table">
                        <tr><td colspan="7" class="loading">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 加载资产列表
        async function loadAssets() {
            const searchInput = document.getElementById('search-input').value;
            const statusFilter = document.getElementById('status-filter').value;
            
            let url = '/api/assets/?page=1&page_size=50';
            if (searchInput) url += '&search=' + encodeURIComponent(searchInput);
            if (statusFilter) url += '&status=' + encodeURIComponent(statusFilter);
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                // 更新计数
                document.getElementById('asset-count').textContent = '已发现 ' + data.total + ' 个资产';
                
                // 更新表格
                const tbody = document.getElementById('assets-table');
                if (data.assets.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="empty-state">暂无发现资产，执行扫描后将自动显示</td></tr>';
                    return;
                }
                
                tbody.innerHTML = '';
                data.assets.forEach(asset => {
                    const tr = document.createElement('tr');
                    
                    // IP 链接
                    const ipTd = document.createElement('td');
                    const ipLink = document.createElement('a');
                    ipLink.href = '/asset/' + asset.ip;
                    ipLink.textContent = asset.ip;
                    ipLink.style.color = 'var(--accent-cyan)';
                    ipLink.style.textDecoration = 'none';
                    ipTd.appendChild(ipLink);
                    tr.appendChild(ipTd);
                    
                    // 状态
                    const statusTd = document.createElement('td');
                    let statusClass = 'unknown';
                    let statusText = '未知';
                    if (asset.status === 'up' || asset.status === 'online') {
                        statusClass = 'online';
                        statusText = '在线';
                    } else if (asset.status === 'down' || asset.status === 'offline') {
                        statusClass = 'offline';
                        statusText = '离线';
                    }
                    statusTd.innerHTML = '<span class="status-badge ' + statusClass + '"><span class="status-dot"></span> ' + statusText + '</span>';
                    tr.appendChild(statusTd);
                    
                    // 其他字段
                    tr.innerHTML += '<td>' + (asset.hostname || '-') + '</td>';
                    tr.innerHTML += '<td>' + (asset.os_name || '-') + '</td>';
                    tr.innerHTML += '<td>' + (asset.vendor || '-') + '</td>';
                    
                    // 端口数量
                    const portCount = asset.open_ports ? asset.open_ports.length : 0;
                    // Handle both new format (object) and old format (string)
                    const portDisplay = portCount > 0 ? asset.open_ports.map(p => {
                        if (typeof p === 'object') return p.port + '/' + p.protocol;
                        return p; // old format "22/tcp" string
                    }).join(', ') : '-';
                    tr.innerHTML += '<td>' + portDisplay + '</td>';
                    
                    // 最后扫描时间
                    tr.innerHTML += '<td>' + formatDateTime(asset.last_scan_at) + '</td>';
                    
                    tbody.appendChild(tr);
                });
                
            } catch (error) {
                console.error('加载资产失败:', error);
                document.getElementById('assets-table').innerHTML = '<tr><td colspan="7" class="empty-state">加载失败</td></tr>';
            }
        }

        // 格式化日期时间
        function formatDateTime(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN');
        }

        // 页面加载时执行
        loadAssets();
n        // 导出 CSV
        function exportCSV() {
            window.location.href = "/api/assets/export";
        }
        
        // 搜索框回车事件
        document.getElementById('search-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') loadAssets();
n        // 导出 CSV
        function exportCSV() {
            window.location.href = "/api/assets/export";
        }
        });
    </script>
    <script src="/static/js/app.js"></script>
</body>
</html>
